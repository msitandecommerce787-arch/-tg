<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join us on Telegram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E0F11;
    --bg-soft: #16181B;
    --ink: #EDEDED;
    --muted: #8B9096;
    --reddit: #FF4500;
    --telegram: #2AABEE;
    --line: #26292D;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  .wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
  }

  .card{
    width:100%;
    max-width: 460px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 48px 36px 36px;
    text-align:center;
    position: relative;
    overflow: hidden;
  }

  /* signature: upvote arrow morphing into a paper-plane trail */
  .signature{
    width: 84px;
    height: 84px;
    margin: 0 auto 28px;
    position: relative;
  }
  .signature svg{
    width:100%;
    height:100%;
    overflow: visible;
  }
  .arrow-path{
    stroke: var(--reddit);
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 130;
    stroke-dashoffset: 130;
    animation: draw-arrow 900ms ease-out forwards;
  }
  .plane-path{
    fill: var(--telegram);
    opacity: 0;
    transform: translate(0,0);
    animation: fly-in 700ms 750ms cubic-bezier(.2,.8,.2,1) forwards;
  }
  .trail{
    stroke: var(--muted);
    stroke-width: 2;
    stroke-dasharray: 4 6;
    fill: none;
    opacity: 0;
    animation: fade-in 400ms 1100ms ease forwards;
  }
  @keyframes draw-arrow{
    to{ stroke-dashoffset: 0; }
  }
  @keyframes fly-in{
    0%{ opacity: 0; transform: translate(-18px, 10px) scale(.6) rotate(-20deg); }
    100%{ opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  }
  @keyframes fade-in{
    to{ opacity: 1; }
  }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
  }
  .eyebrow span{ color: var(--reddit); }
  .eyebrow em{ color: var(--telegram); font-style: normal; }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(26px, 5vw, 32px);
    line-height: 1.2;
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }

  p.sub{
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
    margin: 0 0 32px;
  }

  .cta{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 24px;
    background: var(--telegram);
    color: #0A1520;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    border-radius: 12px;
    transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    box-shadow: 0 8px 24px rgba(42,171,238,0.18);
  }
  .cta:hover{
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(42,171,238,0.28);
    background: #39B6F0;
  }
  .cta:focus-visible{
    outline: 3px solid #7ED0FF;
    outline-offset: 3px;
  }
  .cta svg{ width: 18px; height: 18px; flex-shrink: 0; }

  .foot{
    margin-top: 22px;
    font-size: 12px;
    color: #5C6166;
  }
  .foot a{ color: #5C6166; }

  @media (max-width: 400px){
    .card{ padding: 40px 22px 28px; }
  }

  /* --- edit mode --- */
  .edit-btn{
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 20;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .edit-btn:hover{ border-color: #3a3e43; }

  .photo-slot{
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 24px;
    object-fit: cover;
    display: none;
    border: 2px solid var(--line);
  }
  body.editing .photo-slot{ display: block; }
  body.editing .signature{ display: none; }
  .photo-slot.has-img{ display: block; }
  body:not(.editing) .photo-slot.has-img{ display: block; }
  body:not(.editing) .signature.hidden{ display: none; }

  body.editing h1,
  body.editing p.sub-editable{
    outline: 1px dashed #3a3e43;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: text;
  }
  body.editing .link-field{
    display: block;
  }
  .link-field{
    display: none;
    margin: 14px 0 0;
  }
  .link-field input{
    width: 100%;
    background: #0F1113;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
  }
  .field-label{
    font-size: 11px;
    color: var(--muted);
    text-align: left;
    margin: 14px 0 4px;
    display: none;
  }
  body.editing .field-label{ display: block; }

  .upload-row{
    display: none;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
  }
  body.editing .upload-row{ display: flex; }
  .upload-row button{
    background: #0F1113;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
  }
  .upload-row button:hover{ border-color: #3a3e43; }

  .save-bar{
    display: none;
    margin-top: 18px;
    gap: 8px;
    justify-content: center;
  }
  body.editing .save-bar{ display: flex; }
  .save-bar button{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }
  .save-bar .save{ background: var(--telegram); color: #0A1520; }
  .save-bar .reset{ background: transparent; color: var(--muted); border: 1px solid var(--line); }
</style>
</head>
<body>
  <button class="edit-btn" id="editToggle" type="button">✏️ Edit</button>

  <div class="wrap">
    <div class="card">
      <div class="signature" id="signature" aria-hidden="true">
        <svg viewBox="0 0 84 84">
          <path class="arrow-path" d="M18 52 L42 24 L66 52 M42 24 L42 66" />
          <path class="trail" d="M 8 30 Q 30 20 50 30" />
          <path class="plane-path" d="M62 20 L84 30 L62 40 L66 30 Z" transform="translate(4,-2) rotate(18 70 30)"/>
        </svg>
      </div>
      <img class="photo-slot" id="photoSlot" alt="Profile photo">

      <div class="upload-row">
        <button type="button" id="pickPhoto">📷 Add photo</button>
        <button type="button" id="removePhoto">✕ Remove photo</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none">

      <h1 id="headline" contenteditable="false">Add me for fun 😉</h1>

      <p class="field-label">Telegram link (button target)</p>
      <div class="link-field">
        <input type="text" id="linkInput" value="https://t.me/Sxon1">
      </div>

      <a class="cta" id="ctaLink" href="https://t.me/Sxon1" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.05 3.51 2.42 10.7c-1.28.5-1.27 1.2-.23 1.52l4.77 1.49 1.85 5.6c.22.6.34.85.72.85.28 0 .4-.13.55-.28l1.98-1.9 4.13 3.05c.76.42 1.3.2 1.5-.7l2.72-12.8c.3-1.14-.42-1.66-1.36-1.32z"/></svg>
        <span id="ctaLabel">Join the Telegram</span>
      </a>

      <p class="foot" id="footNote">t.me/Sxon1 — opens in a new tab</p>

      <div class="save-bar">
        <button type="button" class="save" id="saveBtn">💾 Save</button>
        <button type="button" class="reset" id="resetBtn">Reset to default</button>
      </div>
    </div>
  </div>

<script>
(function(){
  var STORAGE_KEY = 'landing_page_data_v1';
  var body = document.body;
  var editToggle = document.getElementById('editToggle');
  var headline = document.getElementById('headline');
  var linkInput = document.getElementById('linkInput');
  var ctaLink = document.getElementById('ctaLink');
  var footNote = document.getElementById('footNote');
  var photoInput = document.getElementById('photoInput');
  var photoSlot = document.getElementById('photoSlot');
  var signature = document.getElementById('signature');
  var pickPhoto = document.getElementById('pickPhoto');
  var removePhoto = document.getElementById('removePhoto');
  var saveBtn = document.getElementById('saveBtn');
  var resetBtn = document.getElementById('resetBtn');

  function applyLink(url){
    ctaLink.href = url;
    footNote.textContent = url.replace(/^https?:\/\//,'') + ' — opens in a new tab';
    linkInput.value = url;
  }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      var data = JSON.parse(raw);
      if(data.headline) headline.textContent = data.headline;
      if(data.link) applyLink(data.link);
      if(data.photo){
        photoSlot.src = data.photo;
        photoSlot.classList.add('has-img');
        signature.classList.add('hidden');
      }
    }catch(e){}
  }

  function saveData(){
    var data = {
      headline: headline.textContent.trim(),
      link: linkInput.value.trim() || 'https://t.me/Sxon1',
      photo: photoSlot.classList.contains('has-img') ? photoSlot.src : null
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    applyLink(data.link);
    alert('Saved! These changes will stay on this page next time you open it in this browser.');
  }

  editToggle.addEventListener('click', function(){
    var editing = body.classList.toggle('editing');
    headline.setAttribute('contenteditable', editing ? 'true' : 'false');
    editToggle.textContent = editing ? '✕ Done editing' : '✏️ Edit';
  });

  pickPhoto.addEventListener('click', function(){ photoInput.click(); });

  photoInput.addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      photoSlot.src = ev.target.result;
      photoSlot.classList.add('has-img');
      signature.classList.add('hidden');
    };
    reader.readAsDataURL(file);
  });

  removePhoto.addEventListener('click', function(){
    photoSlot.src = '';
    photoSlot.classList.remove('has-img');
    signature.classList.remove('hidden');
  });

  linkInput.addEventListener('input', function(){
    applyLink(linkInput.value.trim() || 'https://t.me/Sxon1');
  });

  saveBtn.addEventListener('click', saveData);

  resetBtn.addEventListener('click', function(){
    if(!confirm('Reset everything back to default?')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  });

  loadData();
})();
</script>
</body>
</html>
